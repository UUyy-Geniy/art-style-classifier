name: art-style-classifier

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: artstyle
      POSTGRES_USER: artstyle
      POSTGRES_PASSWORD: artstyle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -U artstyle -d artstyle"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  adminer:
    image: adminer:4.8.1
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - ping
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  mc:
    image: minio/mc:RELEASE.2025-04-08T15-39-49Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc alias set local http://minio:9000 "$${S3_ACCESS_KEY}" "$${S3_SECRET_KEY}" >/dev/null 2>&1; do
          sleep 1
        done
        mc alias set local http://minio:9000 "$${S3_ACCESS_KEY}" "$${S3_SECRET_KEY}" >/dev/null
        mc mb -p local/"$${S3_BUCKET_NAME}" || true
        mc mb -p local/"$${MLFLOW_S3_BUCKET}" || true
        mc anonymous set private local/"$${S3_BUCKET_NAME}" || true
        mc anonymous set private local/"$${MLFLOW_S3_BUCKET}" || true
        touch /tmp/bootstrap.done
        trap : TERM INT
        sleep infinity & wait
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-artstyle-images}
      MLFLOW_S3_BUCKET: ${MLFLOW_S3_BUCKET:-mlflow-artifacts}
    healthcheck:
      test:
        - CMD-SHELL
        - "test -f /tmp/bootstrap.done"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 2s

  model-artifacts:
    image: curlimages/curl:8.11.1
    profiles:
      - setup
    user: "0:0"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        target="/model_bundle/features_large_cls_mean_top18_contemporary_merged_v1.npz"
        if [ -f "$$target" ]; then
          echo "Feature store already exists: $$target"
          exit 0
        fi
        if [ -z "$${MODEL_FEATURE_STORE_URL:-}" ]; then
          echo "MODEL_FEATURE_STORE_URL is not set."
          echo "Set it in .env or put features_large_cls_mean_top18_contemporary_merged_v1.npz into backend/src/artstyle_backend/ml_model/model_bundle manually."
          exit 2
        fi
        curl -L --fail --show-error --progress-bar "$${MODEL_FEATURE_STORE_URL}" -o "$$target.tmp"
        if [ -n "$${MODEL_FEATURE_STORE_SHA256:-}" ]; then
          actual="$$(sha256sum "$$target.tmp" | awk '{print $$1}')"
          if [ "$$actual" != "$${MODEL_FEATURE_STORE_SHA256}" ]; then
            rm -f "$$target.tmp"
            echo "SHA256 mismatch. expected=$${MODEL_FEATURE_STORE_SHA256} actual=$$actual"
            exit 3
          fi
        fi
        mv "$$target.tmp" "$$target"
        echo "Downloaded $$target"
    environment:
      MODEL_FEATURE_STORE_URL: ${MODEL_FEATURE_STORE_URL:-}
      MODEL_FEATURE_STORE_SHA256: ${MODEL_FEATURE_STORE_SHA256:-}
    volumes:
      - ./backend/src/artstyle_backend/ml_model/model_bundle:/model_bundle

  mlflow:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        PRELOAD_DINOV2: ${PRELOAD_DINOV2:-0}
    depends_on:
      postgres:
        condition: service_healthy
      mc:
        condition: service_healthy
    command:
      - sh
      - -c
      - >
        mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri "$${MLFLOW_DATABASE_URL_SYNC}"
        --artifacts-destination "s3://$${MLFLOW_S3_BUCKET}"
    environment:
      MLFLOW_DATABASE_URL_SYNC: ${MLFLOW_DATABASE_URL_SYNC:-postgresql+psycopg2://artstyle:artstyle@postgres:5432/postgres}
      MLFLOW_S3_BUCKET: ${MLFLOW_S3_BUCKET:-mlflow-artifacts}
      MLFLOW_S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-minioadmin}
      AWS_DEFAULT_REGION: ${S3_REGION:-us-east-1}
    ports:
      - "5001:5000"

  migrate:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        PRELOAD_DINOV2: ${PRELOAD_DINOV2:-0}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://artstyle:artstyle@postgres:5432/artstyle}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-postgresql+psycopg://artstyle:artstyle@postgres:5432/artstyle}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
    command:
      - sh
      - -c
      - >
        alembic upgrade head

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        PRELOAD_DINOV2: ${PRELOAD_DINOV2:-0}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mc:
        condition: service_healthy
      mlflow:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://artstyle:artstyle@postgres:5432/artstyle}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-postgresql+psycopg://artstyle:artstyle@postgres:5432/artstyle}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      RABBITMQ_QUEUE_NAME: ${RABBITMQ_QUEUE_NAME:-artstyle.inference}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-artstyle-images}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      MLFLOW_S3_BUCKET: ${MLFLOW_S3_BUCKET:-mlflow-artifacts}
      MLFLOW_S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-minioadmin}
      AWS_DEFAULT_REGION: ${S3_REGION:-us-east-1}
      DEFAULT_MODEL_NAME: ${DEFAULT_MODEL_NAME:-art-style-classifier}
      DEFAULT_MODEL_VERSION: ${DEFAULT_MODEL_VERSION:-stub-v1}
      DEFAULT_MODEL_SOURCE: ${DEFAULT_MODEL_SOURCE:-internal_stub}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      UPLOAD_MAX_SIZE_MB: ${UPLOAD_MAX_SIZE_MB:-10}
      DEFAULT_TOP_K: ${DEFAULT_TOP_K:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RETRAIN_FEEDBACK_EXPORT_DIR: ${RETRAIN_FEEDBACK_EXPORT_DIR:-/app/data/retrain_feedback}
      HF_TOKEN: ${HF_TOKEN:-}
    command:
      - sh
      - -c
      - >
        uvicorn artstyle_backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - retrain_feedback_data:/app/data/retrain_feedback
      - huggingface_cache:/opt/huggingface
      - ./backend/src/artstyle_backend/ml_model/model_bundle:/app/src/artstyle_backend/ml_model/model_bundle

  worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        PRELOAD_DINOV2: ${PRELOAD_DINOV2:-0}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mc:
        condition: service_healthy
      mlflow:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://artstyle:artstyle@postgres:5432/artstyle}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-postgresql+psycopg://artstyle:artstyle@postgres:5432/artstyle}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      RABBITMQ_QUEUE_NAME: ${RABBITMQ_QUEUE_NAME:-artstyle.inference}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-artstyle-images}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      MLFLOW_S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-minioadmin}
      AWS_DEFAULT_REGION: ${S3_REGION:-us-east-1}
      DEFAULT_MODEL_NAME: ${DEFAULT_MODEL_NAME:-art-style-classifier}
      DEFAULT_MODEL_VERSION: ${DEFAULT_MODEL_VERSION:-stub-v1}
      DEFAULT_MODEL_SOURCE: ${DEFAULT_MODEL_SOURCE:-internal_stub}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me}
      DEFAULT_TOP_K: ${DEFAULT_TOP_K:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HF_TOKEN: ${HF_TOKEN:-}
    command:
      - sh
      - -c
      - >
        python -m artstyle_backend.worker.main
    volumes:
      - huggingface_cache:/opt/huggingface
      - ./backend/src/artstyle_backend/ml_model/model_bundle:/app/src/artstyle_backend/ml_model/model_bundle

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.dev.Dockerfile
    depends_on:
      api:
        condition: service_started
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    command:
      - sh
      - -c
      - >
        npm ci
        && npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
  retrain_feedback_data:
  huggingface_cache:
  frontend_node_modules:
